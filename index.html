<style>
:root { --green:#6aaa64; --yellow:#c9b458; --gray:#787c7e; --light-gray:#d3d6da; --bg:#fafaf8; --text:#1a1a2e; --accent:#4f46e5; --radius:12px; --shadow:0 4px 24px rgba(0,0,0,0.08); }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(circle at 15% 15%,rgba(79,70,229,.07) 0%,transparent 50%),radial-gradient(circle at 85% 85%,rgba(106,170,100,.09) 0%,transparent 50%);}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
header{background:white;border-bottom:2px solid #f0f0f0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.logo{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--accent);letter-spacing:1px;}.logo span{color:var(--green);}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn{padding:10px 22px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .18s;}
.btn-primary{background:var(--accent);color:white;}.btn-primary:hover{background:#4338ca;transform:translateY(-1px);}
.btn-green{background:var(--green);color:white;}.btn-green:hover{background:#5a9a55;transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid var(--light-gray);color:var(--text);}.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 14px;font-size:.85rem;}

/* LOGIN */
#login-screen{align-items:center;justify-content:center;padding:40px 20px;}
.login-box{background:white;border-radius:24px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.1);text-align:center;}
.login-emoji{font-size:3.5rem;margin-bottom:16px;}
.login-box h1{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);margin-bottom:6px;}
.login-box>p{color:#666;margin-bottom:30px;font-size:.95rem;}
.tab-sw{display:flex;background:#f3f4f6;border-radius:50px;padding:4px;margin-bottom:28px;}
.tab-sw button{flex:1;padding:9px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;background:transparent;color:#888;transition:all .2s;}
.tab-sw button.active{background:white;color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.fg{margin-bottom:16px;text-align:left;}
.fg label{display:block;font-weight:700;font-size:.85rem;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.fg input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;color:var(--text);transition:border-color .2s;outline:none;}
.fg input:focus{border-color:var(--accent);}
.pw-wrap{position:relative;}.pw-wrap input{padding-right:48px;}
.tp{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#aaa;padding:0;}
.err{color:#ef4444;font-size:.85rem;font-weight:700;margin-top:8px;min-height:20px;}

/* PERIOD PICKER */
.per-sel{margin-bottom:16px;text-align:left;}
.per-sel label{display:block;font-weight:700;font-size:.85rem;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.per-btns{display:flex;gap:8px;flex-wrap:wrap;}
.per-btn{width:54px;height:54px;border-radius:14px;border:2.5px solid #e5e7eb;background:white;font-family:'Fredoka One',cursive;font-size:1.3rem;color:#bbb;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.per-btn:hover{border-color:var(--green);color:var(--green);background:#f0fdf4;}
.per-btn.sel{border-color:var(--green);background:var(--green);color:white;box-shadow:0 4px 12px rgba(106,170,100,.3);}

.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* GAME */
#game-screen{align-items:center;}
.game-wrap{max-width:500px;width:100%;margin:0 auto;padding:20px 16px 40px;}
.welcome-bar{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:16px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.welcome-bar .wname{font-weight:800;font-size:1.05rem;}.welcome-bar .wdate{font-size:.82rem;opacity:.85;margin-top:2px;}.welcome-bar .wper{font-size:.82rem;opacity:.9;margin-top:3px;}

/* GRID */
.grid-wrap{display:flex;flex-direction:column;gap:6px;align-items:center;margin-bottom:20px;}
.grid-row{display:flex;gap:6px;}
.tile{width:58px;height:58px;border:2.5px solid var(--light-gray);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.8rem;text-transform:uppercase;color:var(--text);transition:border-color .1s;user-select:none;}
.tile.filled{border-color:#999;animation:pop .1s ease;}
.tile.correct{background:var(--green);border-color:var(--green);color:white;}
.tile.present{background:var(--yellow);border-color:var(--yellow);color:white;}
.tile.absent{background:var(--gray);border-color:var(--gray);color:white;}
.tile.reveal{animation:flip .5s ease forwards;}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(-90deg);background:var(--light-gray)}100%{transform:rotateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease;}

/* KEYBOARD */
.keyboard{display:flex;flex-direction:column;gap:8px;align-items:center;}
.key-row{display:flex;gap:6px;}
.key{height:56px;min-width:38px;padding:0 6px;border-radius:8px;border:none;background:var(--light-gray);font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.key:hover{filter:brightness(.92);}.key.wide{min-width:60px;font-size:.75rem;font-family:'Nunito',sans-serif;font-weight:800;}
.key.correct{background:var(--green);color:white;}.key.present{background:var(--yellow);color:white;}.key.absent{background:var(--gray);color:white;}

/* RESULT */
.result-box{background:white;border-radius:20px;padding:28px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px;border:2px solid #f0f0f0;}
.result-box .re{font-size:3rem;margin-bottom:10px;}
.result-box h2{font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:6px;}
.result-box .rw{font-size:1rem;color:#666;}.rw strong{color:var(--green);font-size:1.2rem;text-transform:uppercase;}
.result-box .sc{font-size:.9rem;color:#888;margin-top:8px;}

/* CONFETTI */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;top:-20px;animation:cfall linear forwards;pointer-events:none;z-index:9999;}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1a1a2e;color:white;padding:12px 24px;border-radius:50px;font-weight:800;font-size:.95rem;opacity:0;transition:all .3s;z-index:1000;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* TEACHER */
#teacher-screen{align-items:stretch;}
.t-wrap{max-width:900px;width:100%;margin:0 auto;padding:30px 20px 60px;}
.t-wrap>h2{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--accent);margin-bottom:6px;}
.t-wrap .sub{color:#666;font-size:.9rem;margin-bottom:28px;}
.card{background:white;border-radius:20px;padding:24px;margin-bottom:24px;box-shadow:var(--shadow);border:2px solid #f0f0f0;}
.card h3{font-weight:800;font-size:1.1rem;margin-bottom:16px;}
.word-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.word-row .fg{flex:1;min-width:200px;margin-bottom:0;}
.wprev{display:flex;gap:6px;margin-top:14px;}
.wt{width:44px;height:44px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.3rem;color:white;text-transform:uppercase;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-bottom:24px;}
.sc{background:white;border-radius:16px;padding:18px 16px;text-align:center;box-shadow:var(--shadow);border:2px solid #f0f0f0;}
.sc .sn{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--accent);}.sc .sl{font-size:.8rem;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.per-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.per-tab{padding:8px 18px;border-radius:50px;border:2px solid #e5e7eb;background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;color:#888;cursor:pointer;transition:all .15s;}
.per-tab:hover{border-color:var(--accent);color:var(--accent);}.per-tab.active{border-color:var(--accent);background:var(--accent);color:white;}
.per-tab .cnt{display:inline-block;background:rgba(255,255,255,.25);border-radius:50px;padding:1px 7px;font-size:.78rem;margin-left:4px;}
.tw{background:white;border-radius:20px;overflow:hidden;box-shadow:var(--shadow);border:2px solid #f0f0f0;}
.tw-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;}
.tw h3{font-weight:800;font-size:1.05rem;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 20px;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:#999;font-weight:800;border-bottom:2px solid #f3f4f6;}
td{padding:12px 20px;border-bottom:1px solid #f3f4f6;font-weight:600;font-size:.92rem;}
tr:last-child td{border-bottom:none;}tr:hover td{background:#fafafa;}

.dots{display:flex;gap:4px;}
.dot{width:11px;height:11px;border-radius:50%;background:var(--light-gray);}

.rfbtn{font-size:.8rem;color:#aaa;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;padding:4px 8px;border-radius:8px;}
.rfbtn:hover{color:var(--accent);background:#f5f3ff;}

@media(max-width:480px){.tile{width:50px;height:50px;font-size:1.5rem;}.key{height:50px;min-width:32px;font-size:.9rem;}.key.wide{min-width:52px;}.login-box{padding:32px 24px;}}
</style>

<script>
// ============ SUPABASE ============
const sb={
  async q(path,o={}){
    if(SUPABASE_URL==='YOUR_SUPABASE_URL')return{error:'not_configured'};
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':o.prefer||''},
      method:o.method||'GET',body:o.body?JSON.stringify(o.body):undefined});
    if(res.status===204||res.status===201)return{data:null,error:null};
    const d=await res.json().catch(()=>null);
    if(!res.ok)return{data:null,error:d?.message||res.statusText};
    return{data:d,error:null};
  },
  async getClass(c){const r=await this.q(`classes?code=eq.${E(c)}&select=*`);return{data:r.data?.[0]||null,error:r.error};},
  async mkClass(c,n,p){return this.q('classes',{method:'POST',prefer:'return=minimal',body:{code:c,teacher_name:n,teacher_password:p}});},
  async getWord(c,d){const r=await this.q(`daily_words?class_code=eq.${E(c)}&play_date=eq.${d}&select=word`);return{data:r.data?.[0]?.word||null,error:r.error};},
  async setWord(c,w){return this.q('daily_words',{method:'POST',prefer:'resolution=merge-duplicates,return=minimal',body:{class_code:c,word:w,play_date:td()}});},
  async getResults(c,d){
    const r=await this.q(`results?class_code=eq.${E(c)}&play_date=eq.${d||td()}&select=*&order=played_at.asc`);
    if(r.error)console.error('getResults error:',r.error);
    return r;
  },
  async getMyResult(c,n,d){const r=await this.q(`results?class_code=eq.${E(c)}&student_name=eq.${E(n)}&play_date=eq.${d||td()}&select=*`);return{data:r.data?.[0]||null,error:r.error};},
  async saveResult(c,n,p,g,w,cnt){
    const r=await this.q('results',{method:'POST',prefer:'resolution=merge-duplicates,return=minimal',body:{class_code:c,student_name:n,period:p,guesses:g,won:w,guess_count:cnt,play_date:td()}});
    if(r.error)console.error('saveResult error:',r.error);
    return r;
  }
};
const E=s=>encodeURIComponent(s);
function td(){return new Date().toISOString().slice(0,10);}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function toast(msg,dur=1800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function setLoad(id,on,txt){const b=document.getElementById(id);if(!b)return;b.disabled=on;b.innerHTML=on?'<span class="spinner"></span>Loading...':txt;}
function togglePass(){const i=document.getElementById('t-pass');i.type=i.type==='password'?'text':'password';}

// ============ STATE ============
let CU=null,GS=null,selPeriod=null,actPer='all',_results=[],_word=null;

// ============ LOGIN UI ============
function switchTab(t){
  document.querySelectorAll('.tab-sw button').forEach((b,i)=>b.classList.toggle('active',(t==='student'&&i===0)||(t==='teacher'&&i===1)));
  document.getElementById('s-form').style.display=t==='student'?'':'none';
  document.getElementById('t-form').style.display=t==='teacher'?'':'none';
}
function selPer(p){selPeriod=p;document.querySelectorAll('.per-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===p));}

// ============ AUTH ============
async function studentLogin(){
  const first=document.getElementById('s-first').value.trim();
  const last=document.getElementById('s-last').value.trim();
  const code=document.getElementById('s-code').value.trim().toUpperCase();
  const err=document.getElementById('s-err');
  if(!first||!last){err.textContent='Please enter your full name!';return;}
  if(!code){err.textContent='Please enter your class code!';return;}
  if(!selPeriod){err.textContent='Please select your period!';return;}
  setLoad('s-btn',true,"Play Today's Wordle →");err.textContent='';
  const{data:cls,error:ce}=await sb.getClass(code);
  if(ce==='not_configured'){err.textContent='App not set up yet — ask your teacher!';setLoad('s-btn',false,"Play Today's Wordle →");return;}
  if(!cls){err.textContent='Class code not found — double check with your teacher!';setLoad('s-btn',false,"Play Today's Wordle →");return;}
  const{data:word}=await sb.getWord(code,td());
  if(!word){err.textContent="Today's word hasn't been set yet — check back soon!";setLoad('s-btn',false,"Play Today's Wordle →");return;}
  CU={type:'student',name:`${first} ${last}`,classCode:code,period:selPeriod};
  setLoad('s-btn',false,"Play Today's Wordle →");
  showScreen('game-screen');initGame(word);
}

async function teacherLogin(){
  const name=document.getElementById('t-name').value.trim();
  const code=document.getElementById('t-code').value.trim().toUpperCase();
  const pass=document.getElementById('t-pass').value;
  const err=document.getElementById('t-err');
  if(!name){err.textContent='Enter your name!';return;}
  if(!code){err.textContent='Enter a class code!';return;}
  if(pass!==TEACHER_PASSWORD){err.textContent='Incorrect password!';return;}
  setLoad('t-btn',true,'Open Dashboard →');
  const{data:ex}=await sb.getClass(code);
  if(!ex){const{error}=await sb.mkClass(code,name,TEACHER_PASSWORD);if(error){err.textContent='Could not create class.';setLoad('t-btn',false,'Open Dashboard →');return;}}
  CU={type:'teacher',name,classCode:code};
  setLoad('t-btn',false,'Open Dashboard →');
  showScreen('teacher-screen');initTeacher();
}

function logout(){
  CU=null;GS=null;selPeriod=null;actPer='all';
  clearInterval(window._tRefresh);document.removeEventListener('keydown',handleKD);
  showScreen('login-screen');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ============ GAME ============
const ROWS=6,COLS=5;

async function initGame(word){
  document.getElementById('g-name').textContent=CU.name.split(' ')[0];
  document.getElementById('h-name').textContent=`${CU.name} · P${CU.period}`;
  document.getElementById('g-date').textContent=fmtD(td());
  document.getElementById('g-per').textContent=`Period ${CU.period}`;
  buildGrid();buildKeyboard();
  const{data:ex}=await sb.getMyResult(CU.classCode,CU.name,td());
  if(ex){restoreGame(ex,word.toUpperCase());return;}
  GS={word:word.toUpperCase(),guesses:[],cur:'',over:false,won:false,keys:{}};
  document.getElementById('result-box').style.display='none';
  document.addEventListener('keydown',handleKD);
}

function restoreGame(r,word){
  GS={word,guesses:r.guesses,cur:'',over:true,won:r.won,keys:{}};
  r.guesses.forEach((g,row)=>{
    const ev=evalG(g,word);
    ev.forEach((st,col)=>{setTile(row,col,g[col],st);const k=g[col];
      if(st==='correct')GS.keys[k]='correct';
      else if(st==='present'&&GS.keys[k]!=='correct')GS.keys[k]='present';
      else if(!GS.keys[k])GS.keys[k]=st;});
  });
  updKB();showResult(r.won,r.guess_count,word,false);
}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<ROWS;r++){const row=document.createElement('div');row.className='grid-row';row.id=`row-${r}`;
    for(let c=0;c<COLS;c++){const t=document.createElement('div');t.className='tile';t.id=`t-${r}-${c}`;row.appendChild(t);}g.appendChild(row);}
}
function setTile(r,c,l,st){const t=document.getElementById(`t-${r}-${c}`);t.textContent=l;t.className=`tile ${st||'filled'}`;}
function buildKeyboard(){
  const rows=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  rows.forEach(row=>{const div=document.createElement('div');div.className='key-row';
    row.forEach(k=>{const btn=document.createElement('button');btn.className='key'+(k==='ENTER'||k==='⌫'?' wide':'');btn.textContent=k;btn.id=`key-${k}`;btn.addEventListener('click',()=>handleKey(k));div.appendChild(btn);});kb.appendChild(div);});
}
function updKB(){Object.entries(GS.keys).forEach(([k,st])=>{const el=document.getElementById(`key-${k}`);if(el)el.className=`key${(k==='ENTER'||k==='⌫')?' wide':''} ${st}`;});}
function handleKD(e){if(GS?.over||e.ctrlKey||e.metaKey||e.altKey)return;if(e.key==='Enter')handleKey('ENTER');else if(e.key==='Backspace')handleKey('⌫');else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());}
function handleKey(key){
  if(!GS||GS.over)return;const row=GS.guesses.length;
  if(key==='⌫'){if(GS.cur.length>0){GS.cur=GS.cur.slice(0,-1);const t=document.getElementById(`t-${row}-${GS.cur.length}`);t.textContent='';t.className='tile';}return;}
  if(key==='ENTER'){if(GS.cur.length<COLS){shakeRow(row);toast('Not enough letters!');return;}submitGuess();return;}
  if(GS.cur.length<COLS){GS.cur+=key;const col=GS.cur.length-1;const t=document.getElementById(`t-${row}-${col}`);t.textContent=key;t.className='tile filled';}
}
function evalG(guess,word){
  const res=Array(COLS).fill('absent'),wa=word.split(''),ga=guess.split(''),used=Array(COLS).fill(false);
  ga.forEach((l,i)=>{if(l===wa[i]){res[i]='correct';used[i]=true;}});
  ga.forEach((l,i)=>{if(res[i]==='correct')return;const j=wa.findIndex((wl,wi)=>wl===l&&!used[wi]);if(j!==-1){res[i]='present';used[j]=true;}});
  return res;
}
async function submitGuess(){
  const row=GS.guesses.length,guess=GS.cur,word=GS.word,ev=evalG(guess,word);
  ev.forEach((st,col)=>{const t=document.getElementById(`t-${row}-${col}`);setTimeout(()=>{t.classList.add('reveal');setTimeout(()=>{t.className=`tile ${st}`;},250);},col*120);});
  ev.forEach((st,i)=>{const k=guess[i],cur=GS.keys[k];if(st==='correct')GS.keys[k]='correct';else if(st==='present'&&cur!=='correct')GS.keys[k]='present';else if(!cur)GS.keys[k]='absent';});
  GS.guesses.push(guess);GS.cur='';
  const won=ev.every(s=>s==='correct'),cnt=GS.guesses.length;
  setTimeout(async()=>{
    updKB();
    if(won||cnt>=ROWS){
      GS.over=true;GS.won=won;document.removeEventListener('keydown',handleKD);
      await sb.saveResult(CU.classCode,CU.name,CU.period,GS.guesses,won,cnt);
      setTimeout(()=>showResult(won,cnt,word,won),300);
    }
  },COLS*120+300);
}
function showResult(won,cnt,word,animate){
  const box=document.getElementById('result-box');box.style.display='';
  document.getElementById('r-word').textContent=word;
  if(won){
    const emojis=['🎯','🔥','⭐','🏆','😎','🥳'],msgs=['Genius!','Amazing!','Excellent!','Great job!','Nice work!','Phew!'],i=Math.min(cnt-1,5);
    document.getElementById('r-emoji').textContent=emojis[i];
    document.getElementById('r-title').textContent=msgs[i];
    document.getElementById('r-title').style.color='var(--green)';
    document.getElementById('r-score').textContent=`Solved in ${cnt} guess${cnt===1?'':'es'}!`;
    if(animate)confetti();
  }else{
    document.getElementById('r-emoji').textContent='😔';
    document.getElementById('r-title').textContent='Better luck tomorrow!';
    document.getElementById('r-title').style.color='var(--gray)';
    document.getElementById('r-score').textContent='';
  }
  box.scrollIntoView({behavior:'smooth',block:'start'});
}
function shakeRow(r){const el=document.getElementById(`row-${r}`);el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),400);}
function confetti(){
  const colors=['#6aaa64','#c9b458','#4f46e5','#f59e0b','#ec4899','#06b6d4'];
  for(let i=0;i<120;i++){const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),(4+Math.random()*2)*1000);}
}

// ============ TEACHER ============
async function initTeacher(){
  document.getElementById('t-sub').textContent=`Class Code: ${CU.classCode} • ${fmtD(td())}`;
  await refreshDash();
  clearInterval(window._tRefresh);window._tRefresh=setInterval(refreshDash,10000);
}
async function refreshDash(){
  const[{data:word,error:wErr},{data:res,error:rErr}]=await Promise.all([sb.getWord(CU.classCode,td()),sb.getResults(CU.classCode,td())]);
  if(wErr)console.error('getWord error:',wErr);
  if(rErr)console.error('getResults error:',rErr);
  _word=word;_results=res||[];
  document.getElementById('word-in').value=word||'';
  if(word)showWTiles(word);
  buildPerTabs(_results);renderResults();
  // Show last updated time
  const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('t-sub').textContent=`Class Code: ${CU.classCode} • ${fmtD(td())} • Updated ${now}`;
}
function buildPerTabs(res){
  const counts={};res.forEach(r=>{const p=r.period||1;counts[p]=(counts[p]||0)+1;});
  const periods=Object.keys(counts).map(Number).sort((a,b)=>a-b);
  document.getElementById('per-tabs').innerHTML=`
    <button class="per-tab ${actPer==='all'?'active':''}" onclick="switchPer('all')">All <span class="cnt">${res.length}</span></button>
    ${periods.map(p=>`<button class="per-tab ${actPer===p?'active':''}" onclick="switchPer(${p})">Period ${p} <span class="cnt">${counts[p]}</span></button>`).join('')}`;
}
function switchPer(p){actPer=p;buildPerTabs(_results);renderResults();}
function renderResults(){
  const res=actPer==='all'?_results:_results.filter(r=>(r.period||1)===actPer);
  const total=res.length,won=res.filter(r=>r.won).length;
  const avgG=won>0?(res.filter(r=>r.won).reduce((s,r)=>s+r.guess_count,0)/won).toFixed(1):'--';
  const lbl=actPer==='all'?'Total':'Period '+actPer;
  document.getElementById('t-stats').innerHTML=`
    <div class="sc"><div class="sn">${total}</div><div class="sl">${lbl}</div></div>
    <div class="sc"><div class="sn" style="color:var(--green)">${won}</div><div class="sl">Solved ✓</div></div>
    <div class="sc"><div class="sn" style="color:#ef4444">${total-won}</div><div class="sl">Unsolved</div></div>
    <div class="sc"><div class="sn">${avgG}</div><div class="sl">Avg Guesses</div></div>`;
  const tbody=document.getElementById('t-body'),empty=document.getElementById('t-empty');
  if(!res.length){tbody.innerHTML='';empty.style.display='';return;}empty.style.display='none';
  const sorted=[...res].sort((a,b)=>{if(a.won&&!b.won)return -1;if(!a.won&&b.won)return 1;if(a.won&&b.won)return a.guess_count-b.guess_count;return 0;});
  tbody.innerHTML=sorted.map(r=>{
    const st=r.won?`<span class="badge bg">✓ Solved</span>`:`<span class="badge br">✗ Not Solved</span>`;
    const dots=(r.guesses||[]).map(g=>`<div class="dots">${evalG(g.toUpperCase(),(_word||'').toUpperCase()).map(s=>`<div class="dot ${s}"></div>`).join('')}</div>`).join('');
    return`<tr><td><strong>${r.student_name}</strong></td><td>P${r.period||1}</td><td>${st}</td><td>${r.guess_count}/6</td><td><div style="display:flex;flex-direction:column;gap:2px">${dots}</div></td></tr>`;
  }).join('');
}
function showWTiles(word){
  document.getElementById('word-disp').style.display='';
  const tiles=document.getElementById('word-tiles');tiles.innerHTML='';
  word.toUpperCase().split('').forEach(l=>{const t=document.createElement('div');t.className='wt';t.textContent=l;tiles.appendChild(t);});
}
async function setWord(){
  const input=document.getElementById('word-in').value.trim().toUpperCase(),err=document.getElementById('word-err');
  if(input.length!==5){err.textContent='Word must be exactly 5 letters!';return;}
  if(!/^[A-Z]+$/.test(input)){err.textContent='Letters only!';return;}
  setLoad('sw-btn',true,'Set Word');
  const{error}=await sb.setWord(CU.classCode,input);
  setLoad('sw-btn',false,'Set Word');
  if(error){err.textContent='Could not save — check connection.';return;}
  err.textContent='';_word=input;showWTiles(input);toast(`Word set to "${input}"! 🟩`,2000);
}
function exportCSV(){
  const res=actPer==='all'?_results:_results.filter(r=>(r.period||1)===actPer);
  if(!res.length){toast('No results to export!');return;}
  const rows=[['Name','Period','Date','Solved','Guesses','Word']];
  res.forEach(r=>rows.push([r.student_name,r.period||1,r.play_date,r.won?'Yes':'No',r.guess_count,_word||'']));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=`classwordle_${td()}.csv`;a.click();
  toast('CSV downloaded! ⬇',2000);
}

// ============ INIT ============
window.addEventListener('DOMContentLoaded',()=>{
  ['s-first','s-last','s-code'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')studentLogin();}));
  ['t-name','t-code','t-pass'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')teacherLogin();}));
  ['s-code','t-code','word-in'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',function(){this.value=this.value.toUpperCase();});});
});
</script>
