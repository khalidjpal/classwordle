<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassWordle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #6aaa64;
  --yellow: #c9b458;
  --gray: #787c7e;
  --dark-gray: #3a3a3c;
  --light-gray: #d3d6da;
  --bg: #f7f8fc;
  --card-bg: #ffffff;
  --text: #1a1a2e;
  --accent: #4361ee;
  --accent-light: #e8ecff;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

h1, h2, h3 { font-family: 'Fredoka One', cursive; }

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ── ROLE SELECT ── */
#role-screen {
  justify-content: center;
  gap: 20px;
  padding: 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
#role-screen h1 { color: #fff; font-size: 2.8rem; text-shadow: 2px 2px 8px rgba(0,0,0,.2); }
#role-screen .subtitle { color: rgba(255,255,255,.85); font-size: 1.1rem; margin-bottom: 20px; }
.role-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.role-btn {
  background: #fff;
  border: none;
  border-radius: 16px;
  padding: 30px 40px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 15px rgba(0,0,0,.1);
  min-width: 180px;
}
.role-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,.15); }
.role-btn .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

/* ── LOGIN FORMS ── */
#student-login, #teacher-login {
  justify-content: center;
  padding: 20px;
  background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
}
#teacher-login { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

.login-card {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 40px rgba(0,0,0,.12);
}
.login-card h2 { text-align: center; margin-bottom: 24px; font-size: 1.6rem; color: var(--text); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: .9rem; color: #555; }
.form-group input {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--light-gray);
  border-radius: 10px;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  transition: border-color .2s;
}
.form-group input:focus { outline: none; border-color: var(--accent); }

.password-wrapper { position: relative; }
.password-wrapper input { padding-right: 44px; }
.password-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #888;
}

.period-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.period-btn {
  width: 48px; height: 48px;
  border-radius: 12px;
  border: 2px solid var(--light-gray);
  background: #fff;
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all .15s;
}
.period-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s, transform .1s;
}
.submit-btn:hover { background: #3451d1; }
.submit-btn:active { transform: scale(.97); }
.back-link {
  display: inline-block; margin-top: 16px; color: rgba(255,255,255,.9);
  cursor: pointer; font-weight: 700; text-decoration: underline;
}

.error-msg {
  background: #ffe0e0;
  color: #c0392b;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: .9rem;
  margin-bottom: 12px;
  display: none;
}

/* ── GAME SCREEN ── */
#game-screen {
  padding: 0;
  background: var(--bg);
  justify-content: flex-start;
  align-items: center;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

.game-header {
  width: 100%; max-width: 500px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px;
  flex-shrink: 0;
}
.game-header h1 { font-size: 1.2rem; color: var(--accent); }
.game-header .player-info { font-size: .8rem; color: #888; }

/* Board */
.board {
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 5px;
  width: fit-content;
  flex: 1;
  min-height: 0;
  padding: 4px 0;
}
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.tile {
  width: 52px; height: 52px;
  border: 2px solid var(--light-gray);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  text-transform: uppercase;
  color: var(--text);
  transition: border-color .1s;
  user-select: none;
}
.tile.filled { border-color: #888; animation: pop .1s ease; }
.tile.flip {
  animation: flip .5s ease forwards;
}
.tile.correct { background: var(--green); color: #fff; border-color: var(--green); }
.tile.present { background: var(--yellow); color: #fff; border-color: var(--yellow); }
.tile.absent { background: var(--gray); color: #fff; border-color: var(--gray); }

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
@keyframes flip {
  0% { transform: rotateX(0); }
  45% { transform: rotateX(90deg); }
  55% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(4px); }
}
.row.shake { animation: shake .4s ease; }

/* Keyboard */
.keyboard-area {
  width: 100%;
  margin-top: auto;
  display: flex;
  justify-content: center;
  flex-shrink: 0;
}
.keyboard {
  width: 100%;
  max-width: 500px;
  padding: 8px 8px 10px;
  user-select: none;
  flex-shrink: 0;
}
.kb-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 5px;
}
.kb-row:last-child { margin-bottom: 0; }
.key {
  height: 50px;
  min-width: 0;
  padding: 0;
  border: none;
  border-radius: 8px;
  background: #e2e4e9;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: .95rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: background .15s, color .15s, transform .08s;
  display: flex; align-items: center; justify-content: center;
  flex: 1;
  box-shadow: 0 2px 0 rgba(0,0,0,.12);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.key:active { transform: scale(0.95); }
.key.wide {
  flex: 1.5;
  font-size: .8rem;
  letter-spacing: .02em;
}
.key.correct { background: var(--green); color: #fff; box-shadow: 0 2px 0 rgba(0,0,0,.2); }
.key.present { background: var(--yellow); color: #fff; box-shadow: 0 2px 0 rgba(0,0,0,.2); }
.key.absent { background: #3a3a3c; color: #666; box-shadow: 0 2px 0 rgba(0,0,0,.3); opacity: 0.7; }

/* Message toast */
.toast-container {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.toast {
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: .95rem;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ── RESULT SCREEN ── */
#result-screen {
  justify-content: center;
  padding: 20px;
  background: var(--bg);
}
.result-card {
  background: #fff;
  border-radius: 20px;
  padding: 36px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 10px 40px rgba(0,0,0,.1);
}
.result-card h2 { font-size: 1.8rem; margin-bottom: 6px; }
.result-emoji { font-size: 3rem; margin: 10px 0; }
.result-grid {
  font-family: monospace;
  font-size: 1.3rem;
  line-height: 1.6;
  margin: 16px 0;
  letter-spacing: 2px;
}
.result-score { font-size: 1.1rem; color: #555; margin-bottom: 16px; }
.share-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  background: var(--green);
  color: #fff;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  cursor: pointer;
}
.share-btn:hover { filter: brightness(1.1); }
.play-again-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 10px;
}

/* ── TEACHER DASHBOARD ── */
#teacher-dashboard { padding: 16px; background: var(--bg); }

.dash-header {
  width: 100%; max-width: 900px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  margin-bottom: 16px;
}
.dash-header h1 { font-size: 1.5rem; color: var(--accent); }
.dash-header .meta { font-size: .85rem; color: #888; }

.word-setter {
  width: 100%; max-width: 900px;
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
}
.word-setter h3 { width: 100%; margin-bottom: 4px; font-size: 1rem; }
.word-setter input {
  flex: 1; min-width: 140px;
  padding: 10px 14px;
  border: 2px solid var(--light-gray);
  border-radius: 10px;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  text-transform: uppercase;
}
.word-setter input:focus { outline: none; border-color: var(--accent); }
.word-setter button {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  background: var(--green);
  color: #fff;
  font-family: 'Fredoka One', cursive;
  cursor: pointer;
  white-space: nowrap;
}

.period-tabs {
  width: 100%; max-width: 900px;
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
}
.period-tab {
  padding: 8px 18px;
  border: 2px solid var(--light-gray);
  border-radius: 10px;
  background: #fff;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  transition: all .15s;
}
.period-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.stats-row {
  width: 100%; max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.stat-card .num { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--accent); }
.stat-card .label { font-size: .8rem; color: #888; font-weight: 700; }

.results-table-wrap {
  width: 100%; max-width: 900px;
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  overflow-x: auto;
  margin-bottom: 16px;
}
.results-table-wrap h3 { margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: .9rem; }
th { text-align: left; padding: 10px 8px; border-bottom: 2px solid var(--light-gray); font-size: .8rem; color: #888; text-transform: uppercase; }
td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
tr:hover td { background: #fafbff; }
.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: 700;
  font-size: .8rem;
}
.status-badge.solved { background: #e8f5e9; color: var(--green); }
.status-badge.failed { background: #fce4ec; color: #c0392b; }
.dot-progress span {
  display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 2px;
}

.export-btn {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-family: 'Fredoka One', cursive;
  cursor: pointer;
}
.dash-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.logout-btn {
  padding: 10px 24px;
  border: 2px solid var(--light-gray);
  border-radius: 10px;
  background: #fff;
  font-family: 'Fredoka One', cursive;
  cursor: pointer;
  color: #888;
}

/* Dashboard Tabs */
.dash-tabs {
  width: 100%; max-width: 900px;
  display: flex; gap: 0; margin-bottom: 16px;
  border-bottom: 2px solid var(--light-gray);
}
.dash-tab {
  padding: 10px 24px;
  border: none;
  background: none;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  cursor: pointer;
  color: #888;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color .15s, border-color .15s;
}
.dash-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.dash-tab:hover { color: var(--accent); }
.dash-panel { display: none; width: 100%; max-width: 900px; }
.dash-panel.active { display: block; }

/* History */
.history-nav {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.history-nav button {
  padding: 8px 16px;
  border: 2px solid var(--light-gray);
  border-radius: 10px;
  background: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  cursor: pointer;
  font-size: .9rem;
  transition: all .15s;
}
.history-nav button:hover { border-color: var(--accent); color: var(--accent); }
.history-nav button:disabled { opacity: .4; cursor: default; }
.history-nav input[type="date"] {
  padding: 8px 12px;
  border: 2px solid var(--light-gray);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: .9rem;
  font-weight: 600;
}
.history-nav input[type="date"]:focus { outline: none; border-color: var(--accent); }
.history-date-label {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: var(--text);
}
.history-word {
  font-size: .9rem;
  color: #888;
  font-weight: 700;
}
.history-day-card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  cursor: pointer;
  transition: box-shadow .15s;
}
.history-day-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }
.history-day-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.history-day-header .date { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: var(--text); }
.history-day-header .word-badge {
  background: var(--accent-light);
  color: var(--accent);
  padding: 3px 12px;
  border-radius: 6px;
  font-weight: 700;
  font-size: .85rem;
  letter-spacing: .05em;
}
.history-day-header .count { color: #888; font-size: .85rem; font-weight: 700; }
.history-day-header .chevron {
  font-size: 1.2rem;
  color: #ccc;
  transition: transform .2s;
}
.history-day-card.expanded .chevron { transform: rotate(180deg); }
.history-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.history-day-card.expanded .history-detail {
  max-height: 2000px;
}
.history-detail table { margin-top: 12px; }
.history-stats {
  display: flex; gap: 16px; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid #f0f0f0;
  font-size: .85rem; color: #888; font-weight: 700;
}
.history-stats span { color: var(--accent); }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  top: -10px;
  z-index: 9999;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── RESPONSIVE ── */
/* Mobile width */
@media (max-width: 600px) {
  .game-header {
    padding: 4px 10px;
  }
  .game-header h1 { font-size: 1rem; }
  .game-header .player-info { font-size: .75rem; }
  .tile { width: 46px; height: 46px; font-size: 1.3rem; }
  .board { gap: 4px; }
  .row { gap: 4px; }
  .keyboard {
    max-width: 100%;
    padding: 6px 4px calc(env(safe-area-inset-bottom, 4px) + 4px);
    background: #f0f1f4;
    border-top: 1px solid rgba(0,0,0,.06);
  }
  .kb-row { gap: 4px; margin-bottom: 4px; }
  .key { height: 46px; border-radius: 6px; font-size: .82rem; }
  .key.wide { font-size: .68rem; }
  .login-card { padding: 24px 20px; }
  #role-screen h1 { font-size: 2rem; }
}

/* Short screens — shrink tiles further */
@media (max-height: 700px) {
  .tile { width: 42px; height: 42px; font-size: 1.2rem; }
  .board { gap: 3px; padding: 2px 0; }
  .row { gap: 3px; }
  .key { height: 42px; font-size: .78rem; }
  .key.wide { font-size: .62rem; }
  .kb-row { gap: 3px; margin-bottom: 3px; }
  .keyboard { padding: 4px 4px calc(env(safe-area-inset-bottom, 3px) + 3px); }
}

/* Very short screens */
@media (max-height: 600px) {
  .game-header { padding: 2px 10px; }
  .game-header h1 { font-size: .9rem; }
  .tile { width: 36px; height: 36px; font-size: 1rem; }
  .board { gap: 2px; padding: 1px 0; }
  .row { gap: 2px; }
  .key { height: 38px; font-size: .72rem; }
  .key.wide { font-size: .58rem; }
  .kb-row { gap: 2px; margin-bottom: 2px; }
  .keyboard { padding: 3px 3px calc(env(safe-area-inset-bottom, 2px) + 2px); }
}
</style>
</head>
<body>

<!-- ─── ROLE SELECT ─── -->
<div id="role-screen" class="screen active">
  <h1>ClassWordle</h1>
  <p class="subtitle">A Wordle game for your classroom</p>
  <div class="role-buttons">
    <button class="role-btn" onclick="showScreen('student-login')">
      <span class="icon">&#x1F393;</span> Student
    </button>
    <button class="role-btn" onclick="showScreen('teacher-login')">
      <span class="icon">&#x1F4DA;</span> Teacher
    </button>
  </div>
</div>

<!-- ─── STUDENT LOGIN ─── -->
<div id="student-login" class="screen">
  <div class="login-card">
    <h2>Student Login</h2>
    <div id="student-error" class="error-msg"></div>
    <div class="form-group">
      <label>First Name</label>
      <input id="s-first" type="text" placeholder="Enter first name" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input id="s-last" type="text" placeholder="Enter last name" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Class Code</label>
      <input id="s-code" type="text" value="PAL" autocomplete="off" style="text-transform:uppercase;">
    </div>
    <div class="form-group">
      <label>Period</label>
      <div class="period-selector" id="s-period-sel">
        <button class="period-btn" data-p="1">1</button>
        <button class="period-btn" data-p="2">2</button>
        <button class="period-btn" data-p="3">3</button>
        <button class="period-btn" data-p="4">4</button>
        <button class="period-btn" data-p="5">5</button>
      </div>
    </div>
    <button class="submit-btn" onclick="studentLogin()">Play!</button>
  </div>
  <span class="back-link" onclick="showScreen('role-screen')">&#8592; Back</span>
</div>

<!-- ─── TEACHER LOGIN ─── -->
<div id="teacher-login" class="screen">
  <div class="login-card">
    <h2>Teacher Login</h2>
    <div id="teacher-error" class="error-msg"></div>
    <div class="form-group">
      <label>Name</label>
      <input id="t-name" type="text" placeholder="Your name" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Class Code</label>
      <input id="t-code" type="text" value="PAL" readonly style="background:#f0f0f0;cursor:default;" autocomplete="off">
    </div>
    <div class="form-group">

// SUPABASE HELPERS
// ═══════════════════════════════════════════
function sb(endpoint, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || 'return=representation'
  };
  const { prefer, ...fetchOpts } = options;
  console.log('[SB]', options.method || 'GET', url);
  return fetch(url, { ...fetchOpts, headers });
}

function todayStr() {

// ═══════════════════════════════════════════
// GAME SETUP
// ═══════════════════════════════════════════
function startGame() {
  currentRow = 0;
  currentCol = 0;
  guesses = [];
  gameOver = false;

  document.getElementById('player-info').textContent = `${student.first} ${student.last} \u2022 P${student.period}`;

  // Build board
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }

  // Build keyboard
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','DEL']
  ];
  rows.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'kb-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k === 'DEL' ? '\u232B' : k;
      btn.id = `key-${k}`;
      btn.addEventListener('click', () => handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });

  showScreen('game-screen');
}

// ═══════════════════════════════════════════
// KEYBOARD INPUT
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (currentScreen !== 'game-screen' || gameOver) return;
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('DEL');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(key) {
  if (gameOver) return;

  if (key === 'DEL') {
    if (currentCol > 0) {
      currentCol--;
      const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
      tile.textContent = '';
      tile.classList.remove('filled');
    }
    return;
  }

  if (key === 'ENTER') {
    if (currentCol < 5) {
      showToast('Not enough letters');
      shakeRow(currentRow);
      return;
    }
    submitGuess();
    return;
  }

  if (currentCol >= 5) return;
  const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
  tile.textContent = key;
  tile.classList.add('filled');
  currentCol++;
}

function shakeRow(row) {
  const el = document.getElementById(`row-${row}`);
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
}

// ═══════════════════════════════════════════
// SUBMIT GUESS
// ═══════════════════════════════════════════
function submitGuess() {
  let word = '';
  for (let c = 0; c < 5; c++) {
    word += document.getElementById(`tile-${currentRow}-${c}`).textContent;
  }

  guesses.push(word);
  revealRow(currentRow, word);
}

function revealRow(row, word) {
  const target = targetWord.toUpperCase();
  const result = Array(5).fill('absent');
  const targetCounts = {};

  // First pass: correct
  for (let i = 0; i < 5; i++) {
    if (word[i] === target[i]) {
      result[i] = 'correct';
    } else {
      targetCounts[target[i]] = (targetCounts[target[i]] || 0) + 1;
    }
  }
  // Second pass: present
  for (let i = 0; i < 5; i++) {
    if (result[i] !== 'correct' && targetCounts[word[i]] > 0) {
      result[i] = 'present';
      targetCounts[word[i]]--;
    }
  }

  // Animate tiles
  for (let i = 0; i < 5; i++) {
    const tile = document.getElementById(`tile-${row}-${i}`);
    const delay = i * 300;
    setTimeout(() => {
      tile.classList.add('flip');
      setTimeout(() => {
        tile.classList.add(result[i]);
        updateKeyColor(word[i], result[i]);
      }, 250);
    }, delay);
  }

  // After animation
  setTimeout(() => {
    const won = word === target;
    if (won) {
      gameOver = true;
      showToast(['Genius!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!', 'Phew!'][row]);
      launchConfetti();
      setTimeout(() => showResult(true), 1500);
      saveResult(true, row + 1);
    } else if (row === 5) {
      gameOver = true;
      showToast(`The word was ${target}`);
      setTimeout(() => showResult(false), 2000);
      saveResult(false, 6);
    } else {
      currentRow++;
      currentCol = 0;
    }
  }, 5 * 300 + 400);
}

function updateKeyColor(letter, result) {
  const key = document.getElementById(`key-${letter}`);
  if (!key) return;
  const priority = { correct: 3, present: 2, absent: 1 };
  const current = key.classList.contains('correct') ? 3 : key.classList.contains('present') ? 2 : key.classList.contains('absent') ? 1 : 0;
  if (priority[result] > current) {
    key.classList.remove('correct', 'present', 'absent');
    key.classList.add(result);
  }
}

// ═══════════════════════════════════════════
// RESULT SCREEN
// ═══════════════════════════════════════════
function showResult(won) {
  document.getElementById('result-emoji').textContent = won ? '\u{1F389}' : '\u{1F614}';
  document.getElementById('result-title').textContent = won ? 'You got it!' : `The word was ${targetWord}`;
  document.getElementById('result-score').textContent = won ? `Solved in ${guesses.length}/6 guesses` : 'Better luck next time!';
  document.getElementById('result-grid').innerHTML = buildEmojiGrid();
  showScreen('result-screen');
}

function buildEmojiGrid() {
  const target = targetWord.toUpperCase();
  return guesses.map(word => {
    const targetCounts = {};
    const result = Array(5).fill('absent');
    for (let i = 0; i < 5; i++) {
      if (word[i] === target[i]) result[i] = 'correct';
      else targetCounts[target[i]] = (targetCounts[target[i]] || 0) + 1;
    }
    for (let i = 0; i < 5; i++) {
      if (result[i] !== 'correct' && targetCounts[word[i]] > 0) {
        result[i] = 'present';
        targetCounts[word[i]]--;
      }
    }
    return result.map(r => r === 'correct' ? '\u{1F7E9}' : r === 'present' ? '\u{1F7E8}' : '\u2B1B').join('');
  }).join('<br>');
}

function copyResult() {
  const won = guesses[guesses.length - 1].toUpperCase() === targetWord;
  const text = `ClassWordle ${todayStr()} ${won ? guesses.length : 'X'}/6\n\n` +
    document.getElementById('result-grid').textContent.replace(/<br>/g, '\n');
  navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => showToast('Copy failed'));
}

// ═══════════════════════════════════════════
// SAVE RESULT TO SUPABASE
// ═══════════════════════════════════════════
async function saveResult(solved, numGuesses) {
  const classCode = student.code.toUpperCase();
  const studentName = `${student.first} ${student.last}`;

  const payload = {
    class_code: classCode,
    student_name: studentName,
    period: student.period,
    play_date: todayStr(),
    won: solved,
    guess_count: numGuesses,
    guesses: guesses
  };
  console.log('[SAVE] Saving result to Supabase:', JSON.stringify(payload, null, 2));

  try {
    const res = await sb('results', {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    console.log('[SAVE] Response status:', res.status);
    console.log('[SAVE] Response data:', JSON.stringify(data, null, 2));
    if (res.status >= 400) {
      console.error('[SAVE] ERROR saving result! Status:', res.status, 'Body:', data);
      showToast('Error saving result!');
    } else {
      console.log('[SAVE] Result saved successfully!');
    }
  } catch (e) {
    console.error('[SAVE] Failed to save result:', e);
    showToast('Error saving result!');
  }
}

// ═══════════════════════════════════════════
// TEACHER DASHBOARD
// ═══════════════════════════════════════════
async function loadDashboard() {
  if (!teacher) return;
  const code = teacher.code;
  console.log('[DASH] Loading dashboard for class_code="' + code + '" date="' + todayStr() + '"');
  try {
    // Load today's word
    const wRes = await sb(`daily_words?class_code=eq.${encodeURIComponent(code)}&play_date=eq.${todayStr()}&select=word`);
    const words = await wRes.json();
    console.log('[DASH] Word lookup:', words);
    if (words.length) {
      document.getElementById('word-input').value = words[0].word.toUpperCase();
      document.getElementById('word-input').disabled = true;
    }

    // Load results
    const rRes = await sb(`results?class_code=eq.${encodeURIComponent(code)}&play_date=eq.${todayStr()}&select=*&order=student_name.asc`);
    const results = await rRes.json();
    console.log('[DASH] Queried class_code="' + code + '", got', results.length, 'results:', results);

    renderDashboard(results);
  } catch (e) {
    console.error('[DASH] Dashboard load error:', e);
  }
}

function renderDashboard(results) {
  const filtered = activePeriodFilter === 'all' ? results : results.filter(r => r.period == activePeriodFilter);

  const total = filtered.length;
  const solved = filtered.filter(r => r.won).length;
  const unsolved = total - solved;
  const solvedResults = filtered.filter(r => r.won);
  const avg = solvedResults.length ? (solvedResults.reduce((s, r) => s + r.guess_count, 0) / solvedResults.length).toFixed(1) : '-';

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-solved').textContent = solved;
  document.getElementById('stat-unsolved').textContent = unsolved;
  document.getElementById('stat-avg').textContent = avg;

  const tbody = document.getElementById('results-body');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:30px;">No results yet</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const status = r.won
      ? '<span class="status-badge solved">Solved</span>'
      : '<span class="status-badge failed">Failed</span>';

    let dots = '';
    try {
      const guessWords = Array.isArray(r.guesses) ? r.guesses : JSON.parse(r.guesses);
      // Get today's word to compute colors
      const todayWord = document.getElementById('word-input').value.toUpperCase();
      if (todayWord && guessWords.length) {
        dots = guessWords.map(word => {
          const target = todayWord;
          const result = Array(5).fill('absent');
          const tc = {};
          for (let i = 0; i < 5; i++) {
            if (word[i] === target[i]) result[i] = 'correct';
            else tc[target[i]] = (tc[target[i]] || 0) + 1;
          }
          for (let i = 0; i < 5; i++) {
            if (result[i] !== 'correct' && tc[word[i]] > 0) { result[i] = 'present'; tc[word[i]]--; }
          }
          return result.map(c => {
            const color = c === 'correct' ? 'var(--green)' : c === 'present' ? 'var(--yellow)' : 'var(--gray)';
            return `<span style="background:${color}"></span>`;
          }).join('');
        }).join(' ');
      }
    } catch (e) { dots = '-'; }

    return `<tr>
      <td><strong>${r.student_name}</strong></td>
      <td>P${r.period}</td>
      <td>${status}</td>
      <td>${r.won ? r.guess_count + '/6' : 'X/6'}</td>
      <td><div class="dot-progress">${dots}</div></td>
    </tr>`;
  }).join('');

  // Store for CSV export
  window._dashResults = filtered;
}

function filterPeriod(period, btn) {
  activePeriodFilter = period;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadDashboard();
}

async function setWord() {
  const word = document.getElementById('word-input').value.trim().toUpperCase();
  if (word.length !== 5) { showToast('Word must be 5 letters'); return; }
  if (!/^[A-Z]{5}$/.test(word)) { showToast('Letters only'); return; }

  try {
    console.log('[TEACHER] Setting word:', word, 'for class:', teacher.code);
    const res = await sb('daily_words', {
      method: 'POST',
      body: JSON.stringify({
        class_code: teacher.code,
        play_date: todayStr(),
        word: word.toLowerCase()
      }),
      prefer: 'resolution=merge-duplicates,return=representation'
    });
    const data = await res.json();
    console.log('[TEACHER] Set word response:', res.status, data);
    document.getElementById('word-input').disabled = true;
    showToast('Word set!');
  } catch (e) {
    showToast('Error setting word');
  }
}

// ═══════════════════════════════════════════
function exportCSV() {
  const results = window._dashResults || [];
  if (!results.length) { showToast('No data to export'); return; }

  const rows = [['Student Name', 'Period', 'Status', 'Guesses', 'Date']];
  results.forEach(r => {
    rows.push([r.student_name, r.period, r.won ? 'Solved' : 'Failed', r.guess_count, r.play_date]);
  });

  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `classwordle_${teacher.code}_${todayStr()}.csv`;
  a.click();
}

// ═══════════════════════════════════════════
// DASHBOARD TABS
// ═══════════════════════════════════════════
function switchDashTab(tab, btn) {
  document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'history') loadHistory();
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
let historyDate = null;
let historyDays = []; // all available dates

async function loadHistory() {
  if (!teacher) return;
  const code = teacher.code;

  // Load all daily_words for this class to get available dates
  try {
    const wRes = await sb(`daily_words?class_code=eq.${encodeURIComponent(code)}&select=word,play_date&order=play_date.desc`);
    historyDays = await wRes.json();
  } catch (e) {
    console.error('[HISTORY] Failed to load words:', e);
    historyDays = [];
  }

  // Default to most recent past day (not today)
  if (!historyDate) {
    const today = todayStr();
    const pastDay = historyDays.find(d => d.play_date < today);
    historyDate = pastDay ? pastDay.play_date : (historyDays.length ? historyDays[0].play_date : today);
  }

  document.getElementById('hist-date-picker').value = historyDate;
  await renderHistoryForDate(historyDate);
  updateHistoryNav();
}

function updateHistoryNav() {
  const dates = historyDays.map(d => d.play_date).sort();
  const idx = dates.indexOf(historyDate);
  document.getElementById('hist-prev').disabled = idx <= 0;
  document.getElementById('hist-next').disabled = idx >= dates.length - 1;
}

function historyPrev() {
  const dates = historyDays.map(d => d.play_date).sort();
  const idx = dates.indexOf(historyDate);
  if (idx > 0) {
    historyDate = dates[idx - 1];
    document.getElementById('hist-date-picker').value = historyDate;
    renderHistoryForDate(historyDate);
    updateHistoryNav();
  }
}

function historyNext() {
  const dates = historyDays.map(d => d.play_date).sort();
  const idx = dates.indexOf(historyDate);
  if (idx < dates.length - 1) {
    historyDate = dates[idx + 1];
    document.getElementById('hist-date-picker').value = historyDate;
    renderHistoryForDate(historyDate);
    updateHistoryNav();
  }
}

function historyGoToDate(dateStr) {
  historyDate = dateStr;
  document.getElementById('hist-date-picker').value = dateStr;
  renderHistoryForDate(dateStr);
  updateHistoryNav();
}

async function renderHistoryForDate(dateStr) {
  if (!teacher) return;
  const code = teacher.code;
  const container = document.getElementById('history-content');
  container.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px;">Loading...</p>';

  try {
    // Get word for this date
    const wRes = await sb(`daily_words?class_code=eq.${encodeURIComponent(code)}&play_date=eq.${dateStr}&select=word`);
    const words = await wRes.json();
    const word = words.length ? words[0].word.toUpperCase() : null;

    // Get results for this date
    const rRes = await sb(`results?class_code=eq.${encodeURIComponent(code)}&play_date=eq.${dateStr}&select=*&order=student_name.asc`);
    const results = await rRes.json();

    if (!word && !results.length) {
      container.innerHTML = '<p style="color:#aaa;text-align:center;padding:30px;">No game played on this date.</p>';
      return;
    }

    const total = results.length;
    const solved = results.filter(r => r.won).length;
    const solvedResults = results.filter(r => r.won);
    const avg = solvedResults.length ? (solvedResults.reduce((s, r) => s + r.guess_count, 0) / solvedResults.length).toFixed(1) : '-';

    const displayDate = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    let html = `
      <div class="history-day-card expanded" style="cursor:default;">
        <div class="history-day-header">
          <span class="date">${displayDate}</span>
          ${word ? `<span class="word-badge">${word}</span>` : ''}
          <span class="count">${total} student${total !== 1 ? 's' : ''}</span>
        </div>
        <div class="history-stats">
          Solved: <span>${solved}/${total}</span> &nbsp; Avg Guesses: <span>${avg}</span>
        </div>
        <div class="history-detail" style="max-height:none;">`;

    if (results.length) {
      html += `<table>
        <thead><tr><th>Name</th><th>Period</th><th>Status</th><th>Guesses</th><th>Progress</th></tr></thead>
        <tbody>`;
      html += results.map(r => {
        const status = r.won
          ? '<span class="status-badge solved">Solved</span>'
          : '<span class="status-badge failed">Failed</span>';
        let dots = '';
        try {
          const guessWords = Array.isArray(r.guesses) ? r.guesses : JSON.parse(r.guesses);
          if (word && guessWords.length) {
            dots = guessWords.map(g => {
              const target = word;
              const result = Array(5).fill('absent');
              const tc = {};
              for (let i = 0; i < 5; i++) {
                if (g[i] === target[i]) result[i] = 'correct';
                else tc[target[i]] = (tc[target[i]] || 0) + 1;
              }
              for (let i = 0; i < 5; i++) {
                if (result[i] !== 'correct' && tc[g[i]] > 0) { result[i] = 'present'; tc[g[i]]--; }
              }
              return result.map(c => {
                const color = c === 'correct' ? 'var(--green)' : c === 'present' ? 'var(--yellow)' : 'var(--gray)';
                return `<span style="background:${color}"></span>`;
              }).join('');
            }).join(' ');
          }
        } catch (e) { dots = '-'; }
        return `<tr>
          <td><strong>${r.student_name}</strong></td>
          <td>P${r.period}</td>
          <td>${status}</td>
          <td>${r.won ? r.guess_count + '/6' : 'X/6'}</td>
          <td><div class="dot-progress">${dots}</div></td>
        </tr>`;
      }).join('');
      html += `</tbody></table>`;
    } else {
      html += '<p style="color:#aaa;text-align:center;padding:16px;">No student results.</p>';
    }

    html += `</div></div>`;

    // Also show a summary list of all available dates below
    html += '<h3 style="margin:20px 0 12px;">All Past Games</h3>';
    html += historyDays.map(day => {
      const isActive = day.play_date === dateStr;
      const d = new Date(day.play_date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const weekday = d.toLocaleDateString('en-US', { weekday: 'short' });
      return `<div class="history-day-card${isActive ? ' expanded' : ''}" onclick="historyGoToDate('${day.play_date}')" style="padding:12px 16px;margin-bottom:8px;${isActive ? 'border-left:4px solid var(--accent);' : ''}">
        <div class="history-day-header">
          <span class="date" style="font-size:.95rem;">${weekday}, ${label}</span>
          <span class="word-badge">${day.word.toUpperCase()}</span>
          <span class="chevron">${isActive ? '&#9654;' : ''}</span>
        </div>
      </div>`;
    }).join('');

    container.innerHTML = html;
  } catch (e) {
    console.error('[HISTORY] Error:', e);
    container.innerHTML = '<p style="color:#c0392b;text-align:center;padding:20px;">Error loading history.</p>';
  }
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// ═══════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════
function launchConfetti() {
  const colors = ['#6aaa64', '#c9b458', '#4361ee', '#e74c3c', '#f39c12', '#9b59b6', '#1abc9c'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}
